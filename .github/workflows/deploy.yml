name: Deploy Backend Despacho

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }} .

      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-ventas:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/backend-ventas:${{ github.sha }}

      - name: Deploy to EC2 Backend (via EC2 Frontend)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_FRONTEND_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/innovatech-key.pem ec2-user@${{ secrets.EC2_BACKEND_IP }} << 'EOF'
              cd /home/ec2-user/backend-stack
              docker compose pull backend-despacho
              docker compose up -d backend-despacho
            EOF